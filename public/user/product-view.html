<!DOCTYPE html>
<html>
<head>

<title>Product Details</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#f4f6f9;
margin:0;
padding:20px;
}

.header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:20px;
}

.back{
font-size:22px;
cursor:pointer;
color:#2e7d32;
}

.logo{
margin-left:auto;
height:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.images{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:20px;
}

.images img{
width:100%;
height:220px;
object-fit:cover;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.images img:hover{
transform:scale(1.05);
}

.images img{
width:200px;
border-radius:8px;
}

h2{
margin-top:0;
}

.price{
color:#2e7d32;
font-size:20px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">

<span class="back" onclick="history.back()">← Back</span>

<img src="/images/logo.png" class="logo">

</div>

<div class="container">

<div id="productDetails">Loading...</div>

</div>

<script>

let params=new URLSearchParams(window.location.search);

let id=params.get("product_id");

fetch("/get-product/"+id)

.then(res=>res.json())

.then(p=>{

let images="";

["image","image2","image3","image4","image5"].forEach(img=>{
if(p[img]){
images+=`<img src="/uploads/products/${p[img]}">`;
}
});

let html=`

<div class="images">

${images}

</div>

<h2>${p.name}</h2>

<p><strong>Product Code:</strong> ${p.product_code}</p>

<p class="price">₹ ${p.price}</p>

<p>${p.description}</p>

`;

document.getElementById("productDetails").innerHTML=html;

});

</script>

</body>
</html>
