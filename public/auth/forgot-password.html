<!DOCTYPE html>
<html>
<head>

<title>Craft Mantra - Forgot Password</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{

margin:0;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

font-family:'Poppins', sans-serif;

background:linear-gradient(to right,#f3f4ed,#ffffff);

padding:15px;

}

.box{

background:white;

padding:30px;

border-radius:12px;

box-shadow:0 8px 20px rgba(0,0,0,0.15);

width:100%;

max-width:380px;

text-align:center;

}

.logo{
width:70px;
margin-bottom:10px;
}

.title{

font-family:'Cinzel Decorative', serif;

font-size:26px;

color:#5b2c06;

margin:5px 0;

}

.subtitle{

color:#2e7d32;

font-size:13px;

margin-bottom:20px;

}

input{

width:100%;

padding:12px;

margin-bottom:15px;

border:1px solid #ccc;

border-radius:6px;

font-size:14px;

}

input:focus{

border-color:#2e7d32;

outline:none;

}

button{

width:100%;

padding:12px;

border:none;

border-radius:6px;

font-size:15px;

cursor:pointer;

margin-bottom:10px;

}

/* buttons */

.btn-send{
background:#2e7d32;
color:white;
}

.btn-verify{
background:#1565c0;
color:white;
}

.btn-update{
background:#6a1b9a;
color:white;
}

/* hidden */

.hidden{
display:none;
}

.back{

display:block;

text-decoration:none;

margin-top:10px;

color:#2e7d32;

font-weight:600;

}

@media(max-width:480px){

.title{
font-size:22px;
}

}

</style>

</head>

<body>

<div class="box">

<img src="/images/logo.png" class="logo">

<div class="title">Craft Mantra</div>

<div class="subtitle">Forgot Password</div>

<!-- EMAIL -->

<input type="email" id="email" placeholder="Enter your email" required>

<button class="btn-send" onclick="sendOTP()">
Send OTP
</button>

<!-- OTP -->

<div id="otpSection" class="hidden">

<input type="text" id="otp" placeholder="Enter OTP">

<button class="btn-verify" onclick="verifyOTP()">
Verify OTP
</button>

</div>

<!-- NEW PASSWORD -->

<div id="passwordSection" class="hidden">

<input type="password" id="newPassword" placeholder="Enter New Password">

<button class="btn-update" onclick="updatePassword()">
Update Password
</button>

</div>

<a href="/auth/login.html" class="back">
← Back to Login
</a>

</div>

<script>

// SEND OTP FUNCTION
async function sendOTP() {

    const emailInput = document.getElementById("email");
    const email = emailInput.value.trim();

    if (!email) {
        alert("Please enter your email");
        emailInput.focus();
        return;
    }

    try {

        const response = await fetch("/send-otp", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email })
        });

        const data = await response.json();

        alert(data.message);

        if (data.success) {
            document.getElementById("otpSection").classList.remove("hidden");

            // Disable email after sending OTP
            emailInput.disabled = true;
        }

    } catch (error) {

        console.error(error);
        alert("Server error while sending OTP");

    }
}


// VERIFY OTP FUNCTION
async function verifyOTP() {

    const email = document.getElementById("email").value.trim();
    const otpInput = document.getElementById("otp");
    const otp = otpInput.value.trim();

    if (!otp) {
        alert("Please enter OTP");
        otpInput.focus();
        return;
    }

    try {

        const response = await fetch("/verify-otp", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, otp })
        });

        const data = await response.json();

        alert(data.message);

        if (data.success) {

            document.getElementById("passwordSection").classList.remove("hidden");

            // Disable OTP input after verification
            otpInput.disabled = true;
        }

    } catch (error) {

        console.error(error);
        alert("Server error while verifying OTP");

    }
}


// UPDATE PASSWORD FUNCTION
async function updatePassword() {

    const email = document.getElementById("email").value.trim();
    const passwordInput = document.getElementById("newPassword");
    const password = passwordInput.value.trim();

    if (!password) {
        alert("Please enter new password");
        passwordInput.focus();
        return;
    }

    if (password.length < 6) {
        alert("Password must be at least 6 characters");
        passwordInput.focus();
        return;
    }

    try {

        const response = await fetch("/update-password", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        alert(data.message);

        if (data.success) {

            alert("Password updated successfully. Please login.");

            window.location.href = "/auth/login.html";
        }

    } catch (error) {

        console.error(error);
        alert("Server error while updating password");

    }
}

</script>

</body>
</html>
