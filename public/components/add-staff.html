<!DOCTYPE html>
<html>
<head>
<title>Add Staff - Craft Mantra</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#e9e9e9;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:35px;
width:360px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
}

.back{
text-align:left;
margin-bottom:10px;
}

.back a{
text-decoration:none;
color:#2e7d32;
font-weight:500;
}

.logo{
width:60px;
margin-bottom:10px;
}

.title{
font-family:'Cinzel Decorative', serif;
font-size:26px;
color:#5b2c06;
margin:5px 0;
}

.tagline{
color:#2e7d32;
font-size:13px;
margin-bottom:20px;
}

h3{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#2e7d32;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1f5c23;
}

.back-btn{
    position:absolute;
    top:15px;
    left:15px;
    background:#2e7d32;
    color:white;
    padding:6px 12px;
    font-size:13px;
    border-radius:5px;
    text-decoration:none;
}

.back-btn:hover{
    background:#1b5e20;
}

</style>
</head>

<body>

<div class="card">

<a href="javascript:history.back()" class="back-btn" color ="green">← Back</a>

<img src="/images/logo.png" class="logo">

<div class="title">Craft Mantra</div>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<div class="tagline">Touching Lives While Going Green</div>

<h3>Add Staff</h3>

<form id="staffForm">

<input type="text" id="staff_id" placeholder="Generating Staff ID..." readonly>

<input type="text" id="name" placeholder="Enter Staff Name" required>

<input type="email" id="email" placeholder="Enter Email Address" required>

<input type="password" id="password" placeholder="Enter Password" required>

<button type="submit">Add Staff</button>

</form>

</div>

<script>

function generateStaffID(){

fetch("/next-staff-id")
.then(res=>res.json())
.then(data=>{

document.getElementById("staff_id").value=data.code;

})
.catch(()=>{

document.getElementById("staff_id").value="IMCMS01";

});

}

generateStaffID();


document.getElementById("staffForm").addEventListener("submit",function(e){

e.preventDefault();

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

fetch("/add-staff",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
name:name,
email:email,
password:password
})
})
.then(res=>res.json())
.then(data=>{

alert(data.message + " ("+data.code+")");

/* generate next id again */
generateStaffID();

/* clear form */
document.getElementById("staffForm").reset();

});

});

function goDashboard(){
    window.location.href="/admin/admin-dashboard.html";
}

</script>

</body>
</html>
