<!DOCTYPE html>
<html>
<head>
<title>Manage Staff</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

/* TOPBAR */

.topbar{
background:white;
padding:12px 20px;
display:flex;
align-items:center;
justify-content:space-between;
position:relative;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.dashboard-btn{
background:#3498db;
color:white;
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
}

/* TABLE */

.container{
padding:20px;
}

table{
width:100%;
background:white;
border-collapse:collapse;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#34495e;
color:white;
}

.delete{
background:#e74c3c;
color:white;
border:none;
padding:6px 10px;
border-radius:5px;
cursor:pointer;
}

.edit{
background:#27ae60;
color:white;
border:none;
padding:6px 10px;
border-radius:5px;
cursor:pointer;
margin-right:5px;
}

/* EDIT MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:25px;
border-radius:10px;
width:350px;
}

.modal-content h3{
margin-top:0;
}

.modal-content input{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:5px;
}

.save{
background:#2ecc71;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:6px;
cursor:pointer;
}

.close{
background:#95a5a6;
color:white;
border:none;
padding:8px;
margin-top:5px;
width:100%;
border-radius:6px;
cursor:pointer;
}

/* MOBILE */

@media(max-width:700px){

table{
font-size:13px;
}

}

.back-btn{
    background:#2e7d32;
    color:white;
    padding:6px 12px;
    font-size:13px;
    border-radius:5px;
    text-decoration:none;
}

.back-btn:hover{
    background:#1b5e20;
}

.topbar h2{
position:absolute;
left:50%;
transform:translateX(-50%);
margin:0;
color:#2e7d32;
font-weight:bold;
}
.logo{
height:40px;
}

</style>
</head>

<body>

<div class="topbar">

<a href="javascript:history.back()" class="back-btn">← Back</a>

<h2>Manage Staff</h2>

<img src="/images/logo.png" class="logo">

</div>

<div class="container">

<table>

<thead>

<tr>
<th>ID</th>
<th>Staff Code</th>
<th>Name</th>
<th>Email</th>
<th>Action</th>
</tr>

</thead>

<tbody id="staffTable"></tbody>

</table>

</div>

<!-- EDIT MODAL -->

<div class="modal" id="editModal">

<div class="modal-content">

<h3>Edit Staff</h3>

<input type="hidden" id="edit_id">

<input type="text" id="edit_name" placeholder="Staff Name">

<input type="email" id="edit_email" placeholder="Email">

<input type="password" id="edit_password" placeholder="New Password">

<button class="save" onclick="updateStaff()">Save Changes</button>

<button class="close" onclick="closeModal()">Cancel</button>

</div>

</div>

<script>

async function loadStaff(){

let res=await fetch("/get-staff");
let data=await res.json();

let html="";

data.forEach(s=>{

html+=`

<tr>

<td>${s.id}</td>
<td>${s.user_code}</td>
<td>${s.name}</td>
<td>${s.email}</td>

<td>

<button class="edit"
onclick="openEdit(${s.id},'${s.name}','${s.email}')">
Edit
</button>

<button class="delete"
onclick="deleteStaff(${s.id})">
Delete
</button>

</td>

</tr>

`;

});

document.getElementById("staffTable").innerHTML=html;

}

/* DELETE */

async function deleteStaff(id){

if(!confirm("Delete this staff?")) return;

await fetch("/delete-staff/"+id,{
method:"DELETE"
});

loadStaff();

}

/* OPEN EDIT */

function openEdit(id,name,email){

document.getElementById("edit_id").value=id;
document.getElementById("edit_name").value=name;
document.getElementById("edit_email").value=email;
document.getElementById("edit_password").value="";

document.getElementById("editModal").style.display="flex";

}

/* CLOSE MODAL */

function closeModal(){

document.getElementById("editModal").style.display="none";

}

/* UPDATE STAFF */

async function updateStaff(){

let id=document.getElementById("edit_id").value;
let name=document.getElementById("edit_name").value;
let email=document.getElementById("edit_email").value;
let password=document.getElementById("edit_password").value;

await fetch("/update-staff",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
id,name,email,password
})

});

closeModal();

loadStaff();

}

loadStaff();

function goDashboard(){
    window.location.href="/admin/admin-dashboard.html";
}

</script>

</body>
</html>
