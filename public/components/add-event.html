<!DOCTYPE html>
<html>
<head>
<title>Add Event</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    width:400px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
    position:relative;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

label{
    font-weight:bold;
}

input, textarea{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}

textarea{
    resize:none;
    height:80px;
}

button{
    width:100%;
    padding:10px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#2980b9;
}

.back{
    position:absolute;
    top:15px;
    left:15px;
    text-decoration:none;
    font-size:18px;
    color:#2c3e50;
}

.back:hover{
    color:#3498db;
}
.back-btn{
    background:#2e7d32;
    color:white;
    padding:6px 12px;
    font-size:13px;
    border-radius:5px;
    text-decoration:none;
}

.back-btn:hover{
    background:#1b5e20;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.logo{
width:50px;
}

</style>

</head>

<body>
<div style="display:flex;align-items:center;gap:15px;">

<div class="container">
<div class="top-bar">
<a href="javascript:history.back()" class="back-btn">← Back</a>

<img src="/images/logo.png" class="logo">
</div>

<h2>Add Event</h2>

<form action="/add-event" method="POST" enctype="multipart/form-data">

<label>Event Name:</label>
<input type="text" name="name" required>

<label>Date:</label>
<input type="date" name="date" required>

<label>Description:</label>
<textarea name="description"></textarea>

<label>Image 1:</label>
<input type="file" name="image1">

<label>Image 2:</label>
<input type="file" name="image2">

<label>Image 3:</label>
<input type="file" name="image3">

<button type="submit">Add Event</button>


</form>

</div>
<script>
function goDashboard(){
    window.location.href="/admin/admin-dashboard.html";
}
</script>
</body>
</html>
